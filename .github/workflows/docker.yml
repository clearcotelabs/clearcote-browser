name: Publish Docker image

# Rebuild + push teamflatearth/clearcote whenever a new SDK version lands on PyPI. A new SDK
# release is exactly when `pip install clearcote` resolves to a new pinned browser binary, so
# the image must be rebuilt then. Runs AFTER "Publish PyPI SDK" succeeds (so the version is
# actually installable), or manually via workflow_dispatch.
on:
  workflow_run:
    workflows: ["Publish PyPI SDK"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "clearcote SDK version to bake in (blank = current pyproject version)"
        required: false

permissions:
  contents: read

jobs:
  publish:
    # only after a SUCCESSFUL PyPI publish (or a manual run)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve SDK version, wait for PyPI, read its pinned browser tag
        id: v
        run: |
          SDK="${{ github.event.inputs.version }}"
          [ -z "$SDK" ] && SDK=$(grep -m1 -oP '^version\s*=\s*"\K[^"]+' sdk/python/pyproject.toml)
          # Wait until the exact version is actually pip-INSTALLABLE (up to 5 min) by retrying the
          # REAL `pip install`. Gating on the /json API (as before) races: pypi.org/.../json goes
          # live before pip's install index propagates, so the loop broke early and the install
          # below then 404'd ("No matching distribution found for clearcote==<ver>").
          for i in $(seq 1 30); do
            pip install --quiet "clearcote==${SDK}" && break
            echo "waiting for PyPI clearcote ${SDK} to become pip-installable ($i/30)..."; sleep 10
            [ "$i" = 30 ] && { echo "::error::clearcote ${SDK} never became pip-installable on PyPI"; exit 1; }
          done
          # The browser tag MUST come from the SDK we just installed (so the image tag == the baked
          # binary), not the repo checkout (which may be ahead of the published SDK).
          BROWSER=$(python -c "from clearcote.release import platform_release; print(platform_release('linux')['tag'][1:])")
          echo "sdk=$SDK" >> "$GITHUB_OUTPUT"
          echo "browser=$BROWSER" >> "$GITHUB_OUTPUT"
          echo "clearcote SDK=$SDK -> browser v$BROWSER"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push teamflatearth/clearcote
        uses: docker/build-push-action@v6
        with:
          context: docker
          push: true
          platforms: linux/amd64
          build-args: |
            CLEARCOTE_SPEC===${{ steps.v.outputs.sdk }}
          tags: |
            teamflatearth/clearcote:latest
            teamflatearth/clearcote:${{ steps.v.outputs.browser }}
            teamflatearth/clearcote:sdk-${{ steps.v.outputs.sdk }}

      - name: Summary
        run: |
          echo "### Pushed \`teamflatearth/clearcote\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`latest\`, \`${{ steps.v.outputs.browser }}\`, \`sdk-${{ steps.v.outputs.sdk }}\` (browser binary v${{ steps.v.outputs.browser }})" >> "$GITHUB_STEP_SUMMARY"
