# Unit tests + version-drift guard for the Node and Python SDKs.
# Runs on every PR / push that touches the SDKs, and is reused by the publish
# workflows (workflow_call) so a release can never go out with failing tests or a
# RELEASE pin that points at a missing / mismatched browser build.
name: SDK CI

on:
  pull_request:
    paths:
      - "sdk/**"
      - "scripts/check_release_pin.py"
      - ".github/workflows/sdk-ci.yml"
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "scripts/check_release_pin.py"
      - ".github/workflows/sdk-ci.yml"
  workflow_call: {} # callable as a gate by npm.yml / pypi.yml
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  node:
    name: node SDK tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/node
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/node/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  python:
    name: python SDK tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[test]"
      - run: pytest -q

  release-pin:
    name: version-drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Assert RELEASE pin exists on GitHub and checksums match
        run: python scripts/check_release_pin.py
        env:
          GITHUB_TOKEN: ${{ github.token }}
