# Patch-integrity gate: proves every Clearcote patch is correctly applied before a release.
# Clearcote IS its patch set, and a lost stealth patch fails OPEN (the browser still runs, just
# less stealthy), so this is enforced, not advisory. See docs/PATCH-INTEGRITY.md.
#
#   Layer 0 (integrity)  — series <-> patch files <-> manifest completeness. No tree/binary
#                          needed, so it runs on every push/PR that touches the patch set.
#   Layer 1 (source)     — reverse-apply against the BUILD TREE. Can't run here (no tree); it is
#                          enforced at build time by scripts/01-apply-patches.sh and at release
#                          time by docs/RELEASING.md §4a on the build host.
#   Layer 2 (binary)     — each patch's markers are present in the PINNED release binary. This is
#                          an on-demand / post-release check (see the job comment for why it does
#                          not run on ordinary pushes). The authoritative pre-publish Layer 2 is
#                          RELEASING.md §4a, against the freshly-built binary.
name: Patch integrity

on:
  workflow_dispatch: {}
  workflow_call: {} # callable as a release / promotion gate
  push:
    branches: [main]
    paths:
      - "patches/**"
      - "scripts/verify_patches.py"
      - "scripts/patch_markers.json"
      - ".github/workflows/patch-integrity.yml"
  pull_request:
    paths:
      - "patches/**"
      - "scripts/verify_patches.py"
      - "scripts/patch_markers.json"
      - ".github/workflows/patch-integrity.yml"

permissions:
  contents: read

jobs:
  integrity:
    # Layer 0 — series/file/manifest consistency + manifest completeness. Cheap, total over the
    # patch set, needs nothing external — so it gates every push/PR that touches patches.
    name: Layer 0 — series + manifest integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/verify_patches.py # no --tree/--binary => Layer 0 only

  binary:
    # Layer 2 — every patch's code is actually in the PINNED release binary. Runs ON DEMAND only
    # (the "Run workflow" button), NOT on pushes, for two reasons:
    #   * fetch_release_binary.py resolves the per-OS pin, so it must run on windows-latest — the
    #     published Windows .zip it knows how to unpack + checksum-verify — not a Linux runner.
    #   * it is only meaningful when the checked-out patch set matches the pinned release. Between
    #     releases patches/ runs AHEAD of the pin, so a marker for a not-yet-released patch is
    #     legitimately absent from the older pinned binary — that is not a regression. Dispatch it
    #     right after a release (pin == patches) as a post-publish check on the artifact users get.
    # The authoritative pre-publish Layer 2 is docs/RELEASING.md §4a, against the FRESH build.
    name: Layer 2 — markers in the pinned release binary (on-demand)
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch + checksum-verify the SDK-pinned release binary
        run: python scripts/fetch_release_binary.py --dest "${{ runner.temp }}/rel"
      - name: Verify every patch's code compiled into the binary
        run: python scripts/verify_patches.py --binary "${{ runner.temp }}/rel"
