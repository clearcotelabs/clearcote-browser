# Publishes the `clearcote` npm package from sdk/node via OIDC trusted publishing.
# Register THIS filename (npm.yml) + environment name (npm) on npmjs.com:
#   clearcote -> Settings -> Trusted Publisher -> GitHub Actions.
# No NPM_TOKEN secret is needed for the OIDC path. See docs/RELEASING-SDK.md.
name: Publish npm SDK

on:
  push:
    tags:
      - 'sdk-v*'          # PRIMARY: fires only on SDK tags (sdk-v0.6.1), never on browser v0.1.0-pre.N tags
  workflow_dispatch:       # MANUAL fallback (re-run a failed publish / out-of-band release)
    inputs:
      version:
        description: 'SDK version being published (informational, e.g. 0.6.1). Source of truth is sdk/node/package.json.'
        required: false

concurrency:
  group: publish-npm
  cancel-in-progress: false   # never cancel an in-flight publish

permissions:
  contents: read

jobs:
  # Gate: SDK unit tests + version-drift guard must pass before we publish.
  ci:
    uses: ./.github/workflows/sdk-ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest          # must be a cloud-hosted runner for OIDC + provenance
    environment: npm                # approval gate; OIDC sub = repo:clearcotelabs/clearcote-browser:environment:npm
    permissions:
      id-token: write               # REQUIRED: mint the OIDC token npm exchanges for a publish credential
      contents: read                # checkout
    defaults:
      run:
        working-directory: sdk/node
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'                         # Node >= 22.14.0 required; 24 is safe
          registry-url: 'https://registry.npmjs.org' # writes .npmrc; harmless under OIDC
          # NOTE: deliberately NO `cache:` - do not publish stale artifacts from a cache.

      - name: Ensure npm >= 11.5.1 (required for OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -> dist/)
        run: npm run build

      - name: Verify package version matches the sdk-v* tag (skip on manual dispatch)
        if: github.event_name == 'push'
        run: |
          PKG_VER="$(node -p "require('./package.json').version")"
          TAG_VER="${GITHUB_REF_NAME#sdk-v}"
          echo "package.json=$PKG_VER  tag=$TAG_VER"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::package.json version ($PKG_VER) does not match tag sdk-v$TAG_VER"
            exit 1
          fi

      - name: Publish to npm (OIDC; provenance auto-generated)
        run: npm publish --access public
        # No NODE_AUTH_TOKEN. The npm CLI uses the OIDC id-token automatically.
        # Provenance + publish attestation are generated by default (repository field
        # in package.json already matches the public repo, case-sensitively).
        # npm 403s by default if this exact version was already published.
